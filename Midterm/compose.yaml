services:
  server:
    image: fernoel/jactsrv
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydb
      - SECRET=130924254092218021
    depends_on:
      - mongo
    deploy:
      replicas: 2

  client:
    image: fernoel/jactclient
    ports:
      - "5000:5000"
    deploy:
      replicas: 2

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-jact-data:/data/db

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
      - ./alert.rules:/etc/prometheus/alert_rules.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
      - alertmanager

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    volumes:
      - ./alertmanager.yaml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"

volumes:
  mongo-jact-data: